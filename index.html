<html lang="zh-CN">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:linear-gradient(180deg,#1a0000 0%,#2d0000 50%,#1a0000 100%);color:#e8d5a0;min-height:100vh}
.banner{text-align:center;padding:30px 15px 20px;background:radial-gradient(ellipse at center,rgba(139,0,0,0.4) 0%,transparent 70%)}
.banner h1{font-size:2.2em;font-weight:700;letter-spacing:8px;text-shadow:0 0 20px rgba(212,175,55,0.5);margin-bottom:8px}
.banner .sub{color:#c9a84c;font-size:0.95em;letter-spacing:4px;opacity:0.8}
.luopan{font-size:3em;margin-bottom:10px;animation:spin 20s linear infinite;display:inline-block}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

.card{background:rgba(60,10,10,0.6);border:1px solid rgba(212,175,55,0.3);border-radius:12px;margin:12px auto;padding:16px;max-width:600px;backdrop-filter:blur(4px)}
.card-title{color:#d4af37;font-size:1.1em;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(212,175,55,0.2);display:flex;align-items:center;gap:8px}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.full{grid-template-columns:1fr}
.form-row label{display:block;font-size:0.8em;color:#b89f6a;margin-bottom:4px}
.form-row input,.form-row select{width:100%;padding:10px 12px;border:1px solid rgba(212,175,55,0.25);border-radius:8px;background:rgba(0,0,0,0.3);color:#e8d5a0;font-size:0.95em;outline:none}
.form-row input:focus,.form-row select:focus{border-color:#d4af37}
.form-row input::placeholder{color:#6a5a3a}

.btn-main{display:block;width:100%;max-width:600px;margin:15px auto;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#d4af37 0%,#b8941d 100%);color:#1a0000;font-size:1.1em;font-weight:700;letter-spacing:4px;cursor:pointer;transition:all 0.3s}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(212,175,55,0.4)}
.btn-main:disabled{background:#4a3a1a;color:#8a7a5a;cursor:not-allowed;transform:none;box-shadow:none}

.advanced-toggle{text-align:center;margin:8px 0;cursor:pointer;color:#a09060;font-size:0.85em}
.advanced-toggle:hover{color:#d4af37}
.advanced-panel{display:none}
.advanced-panel.open{display:block}

/* 九宫格 */
.pan-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;max-width:500px;margin:15px auto}
.gong{background:rgba(0,0,0,0.4);border:1px solid rgba(212,175,55,0.15);border-radius:8px;padding:10px 8px;font-size:0.72em;min-height:110px;position:relative;overflow:hidden}
.gong::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:transparent}
.gong-header{font-weight:700;color:#d4af37;font-size:0.9em;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center}
.gong-star{color:#ffd700;font-size:1.1em}
.gong-row{margin:2px 0;color:#c9b896;font-size:0.9em;line-height:1.5}
.gong-row .label{color:#8a7a5a;margin-right:4px}
.gong-ping{text-align:center;margin-top:4px;padding-top:4px;border-top:1px solid rgba(212,175,55,0.1);font-weight:700;font-size:0.95em}

.gong-daji{border-color:rgba(40,167,69,0.5);background:rgba(40,167,69,0.08)}
.gong-daji::before{background:rgba(40,167,69,0.6)}
.gong-jixiong{border-color:rgba(255,193,7,0.5);background:rgba(255,193,7,0.05)}
.gong-jixiong::before{background:rgba(255,193,7,0.5)}
.gong-xiong{border-color:rgba(220,53,69,0.5);background:rgba(220,53,69,0.06)}
.gong-xiong::before{background:rgba(220,53,69,0.5)}
.gong-daxiong{border-color:rgba(139,0,0,0.6);background:rgba(139,0,0,0.1)}
.gong-daxiong::before{background:rgba(139,0,0,0.7)}

.info-line{color:#c9b896;font-size:0.85em;line-height:1.8}
.info-line b{color:#d4af37}

.analysis-box{background:rgba(0,0,0,0.3);border-left:3px solid #d4af37;padding:12px;margin-top:10px;border-radius:0 8px 8px 0}
.analysis-box h4{color:#d4af37;margin-bottom:8px;font-size:0.95em}
.analysis-box p{color:#c9b896;font-size:0.85em;line-height:1.7;margin:4px 0}

.sanchuan{display:flex;justify-content:center;gap:20px;padding:10px;font-size:0.85em;color:#c9b896}
.sanchuan span b{color:#d4af37}

.loading{text-align:center;padding:30px;color:#a09060}
.hidden{display:none}

@media(min-width:768px){body{padding:0 20px}.banner h1{font-size:2.8em}.gong{font-size:0.8em;min-height:130px}}
</style>
</head>

</div>

<script type="py">
from pyscript import when
from js import document
import datetime

# ========== 常量 ==========
GAN = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸']
ZHI = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥']
BA = ['开门','休门','生门','伤门','杜门','景门','死门','惊门']
BA_SHEN = ['值符','螣蛇','太阴','六合','白虎','玄武','九地','九天']
JIUXING = ['天蓬','天任','天冲','天辅','天英','天芮','天柱','天心']

XUN_KONG = {
    '甲子':'戌亥','甲戌':'申酉','甲申':'午未','甲午':'辰巳',
    '甲辰':'寅卯','甲寅':'子丑',
}

ZHI_GONG = {'子':1,'丑':8,'寅':3,'卯':4,'辰':5,'巳':6,'午':7,'未':8,'申':1,'酉':2,'戌':5,'亥':6}
JIANG12 = ['登明','河魁','从魁','传送','小吉','胜光','太乙','天罡','太冲','功曹','大吉','神后']

XING_JIXIONG = {
    '天蓬':{'1':'大吉','6':'大吉','2':'大凶','7':'大凶','3':'平','4':'吉','8':'吉','9':'凶'},
    '天任':{'8':'大吉','1':'吉','3':'吉','4':'吉','9':'平','2':'凶','7':'凶','6':'凶'},
    '天冲':{'3':'大吉','4':'大吉','1':'吉','9':'吉','8':'平','7':'凶','2':'凶','6':'凶'},
    '天辅':{'4':'大吉','9':'大吉','3':'吉','1':'吉','8':'平','2':'凶','7':'凶','6':'凶'},
    '天英':{'9':'大吉','2':'吉','4':'吉','3':'平','1':'平','8':'凶','7':'凶','6':'凶'},
    '天芮':{'2':'吉','8':'平','1':'平','9':'平','3':'凶','4':'凶','6':'大凶','7':'大凶'},
    '天柱':{'7':'吉','6':'吉','2':'平','1':'平','9':'凶','4':'凶','3':'凶','8':'大凶'},
    '天心':{'6':'大吉','7':'大吉','1':'吉','9':'吉','4':'平','3':'凶','2':'凶','8':'凶'},
}

MEN_JIXIONG = {
    '开门':{'6':'大吉','1':'吉','7':'吉','4':'平','9':'平','3':'凶','8':'凶','2':'大凶'},
    '休门':{'1':'大吉','6':'大吉','7':'吉','8':'吉','4':'平','9':'平','3':'凶','2':'凶'},
    '生门':{'8':'大吉','1':'大吉','3':'吉','4':'吉','9':'平','7':'平','2':'凶','6':'凶'},
    '伤门':{'3':'吉','4':'吉','1':'平','9':'平','8':'凶','7':'凶','2':'大凶','6':'大凶'},
    '杜门':{'4':'吉','3':'吉','9':'平','1':'平','7':'凶','6':'凶','2':'大凶','8':'大凶'},
    '景门':{'9':'大吉','2':'吉','4':'吉','3':'平','1':'平','8':'凶','7':'凶','6':'大凶'},
    '死门':{'2':'平','8':'平','1':'凶','9':'凶','4':'凶','3':'凶','6':'大凶','7':'大凶'},
    '惊门':{'7':'平','6':'平','2':'凶','1':'凶','9':'凶','4':'凶','3':'大凶','8':'大凶'},
}

# 节气日期范围（简化查表）
JIEQI_RANGES = [
    ((1,1),(1,5),'冬至'),((1,6),(1,20),'小寒'),((1,21),(1,31),'大寒'),
    ((2,1),(2,3),'大寒'),((2,4),(2,18),'立春'),((2,19),(2,28),'雨水'),
    ((3,1),(3,5),'雨水'),((3,6),(3,20),'惊蛰'),((3,21),(3,31),'春分'),
    ((4,1),(4,4),'春分'),((4,5),(4,19),'清明'),((4,20),(4,30),'谷雨'),
    ((5,1),(5,5),'谷雨'),((5,6),(5,20),'立夏'),((5,21),(5,31),'小满'),
    ((6,1),(6,5),'小满'),((6,6),(6,21),'芒种'),((6,22),(6,30),'夏至'),
    ((7,1),(7,6),'夏至'),((7,7),(7,22),'小暑'),((7,23),(7,31),'大暑'),
    ((8,1),(8,6),'大暑'),((8,7),(8,22),'立秋'),((8,23),(8,31),'处暑'),
    ((9,1),(9,6),'处暑'),((9,7),(9,22),'白露'),((9,23),(9,30),'秋分'),
    ((10,1),(10,7),'秋分'),((10,8),(10,22),'寒露'),((10,23),(10,31),'霜降'),
    ((11,1),(11,6),'霜降'),((11,7),(11,21),'立冬'),((11,22),(11,30),'小雪'),
    ((12,1),(12,6),'小雪'),((12,7),(12,21),'大雪'),((12,22),(12,31),'冬至'),
]

YANG_JIEQI = ['冬至','小寒','大寒','立春','雨水','惊蛰','春分','清明','谷雨','立夏','小满','芒种','夏至','小暑','大暑']

JUSHU_MAP = {
    '冬至':1,'小寒':2,'大寒':3,'立春':8,'雨水':9,'惊蛰':1,'春分':2,'清明':3,'谷雨':8,
    '立夏':5,'小满':5,'芒种':6,'夏至':9,'小暑':8,'大暑':7,'立秋':2,'处暑':1,
    '白露':9,'秋分':8,'寒露':7,'霜降':1,'立冬':4,'小雪':4,'大雪':5
}

# 日柱基准
BASE_DATE = datetime.date(2026,1,1)
BASE_ORDINAL = BASE_DATE.toordinal()
BASE_GAN = 2   # 丙
BASE_ZHI = 2   # 寅

YUE_GAN_START = {
    0:2,5:2,  # 甲己->丙
    1:4,6:4,  # 乙庚->戊
    2:6,7:6,  # 丙辛->庚
    3:8,8:8,  # 丁壬->壬
    4:0,9:0,  # 戊癸->甲
}

SHI_GAN_START = {
    0:0,5:0,  # 甲己->甲
    1:2,6:2,  # 乙庚->丙
    2:4,7:4,  # 丙辛->戊
    3:6,8:6,  # 丁壬->庚
    4:8,9:8,  # 戊癸->壬
}

# ========== 自动推算 ==========
def auto_calc_sizhu(year,month,day,hour):
    # 年柱
    nian_gan = (year-4)%10
    nian_zhi = (year-4)%12
    nianzhu = GAN[nian_gan]+ZHI[nian_zhi]
    
    # 月柱
    start = YUE_GAN_START[nian_gan]
    yue_gan = (start+month-1)%10
    yue_zhi = (month+1)%12  # 正月寅=2
    yuezhu = GAN[yue_gan]+ZHI[yue_zhi]
    
    # 日柱
    d = datetime.date(year,month,day)
    offset = d.toordinal()-BASE_ORDINAL
    ri_gan = (BASE_GAN+offset)%10
    ri_zhi = (BASE_ZHI+offset)%12
    rizhu = GAN[ri_gan]+ZHI[ri_zhi]
    
    # 时柱
    zhi_idx = (hour+1)//2%12
    start = SHI_GAN_START[ri_gan]
    shi_gan = (start+zhi_idx)%10
    shizhu = GAN[shi_gan]+ZHI[zhi_idx]
    
    return nianzhu,yuezhu,rizhu,shizhu,zhi_idx

def get_jieqi(year,month,day):
    for (m_start,d_start),(m_end,d_end),jq in JIEQI_RANGES:
        if month==m_start and d_start<=day<=d_end:
            return jq
    return '立春'

def get_yinyang(jieqi):
    return '阳' if jieqi in YANG_JIEQI else '阴'

# ========== 排盘核心 ==========
def get_xunkong(zhu):
    for xun,kong in XUN_KONG.items():
        if zhu[0] in xun:
            return kong
    return ''

def paipan_core(nianzhu,yuezhu,rizhu,shizhu,jieqi,ju_shu,yin_yang,lunar_month):
    dipan = {1:'癸',2:'己',3:'戊',4:'乙',5:'丁',6:'丙',7:'辛',8:'壬',9:'庚'}
    order = ['戊','己','庚','辛','壬','癸','丁','丙','乙']
    
    if yin_yang=='阳':
        gong_order = [1,8,3,4,9,2,7,6]
    else:
        gong_order = [9,2,7,6,1,8,3,4]
    
    start_idx = gong_order.index(ju_shu) if ju_shu in gong_order else 0
    
    tianpan_gan = {}
    for i,g in enumerate(order):
        idx = (start_idx+i)%8 if yin_yang=='阳' else (start_idx-i)%8
        gong = gong_order[idx]
        tianpan_gan[gong] = g
    
    xing_order = ['天蓬','天任','天冲','天辅','天英','天芮','天柱','天心']
    tianpan_xing = {}
    for i,xing in enumerate(xing_order):
        idx = (start_idx+i)%8 if yin_yang=='阳' else (start_idx-i)%8
        gong = gong_order[idx]
        tianpan_xing[gong] = xing
    
    zhifu = tianpan_xing.get(ju_shu,'天蓬')
    men_map = {1:'休门',8:'生门',3:'伤门',4:'杜门',9:'景门',2:'死门',7:'惊门',6:'开门'}
    zhishi = men_map.get(ju_shu,'休门')
    zhishi_gong = ju_shu
    
    renpan = {}
    men_start = list(men_map.values()).index(zhishi)
    for i,gong in enumerate(gong_order):
        idx = (men_start+i)%8 if yin_yang=='阳' else (men_start-i)%8
        renpan[gong] = BA[idx%8]
    
    shenpan = {}
    shen_start = gong_order.index(ju_shu) if ju_shu in gong_order else 0
    for i,gong in enumerate(gong_order):
        idx = (shen_start+i)%8 if yin_yang=='阳' else (shen_start-i)%8
        shenpan[gong] = BA_SHEN[idx%8]
    
    xunkong_ri = get_xunkong(rizhu)
    xunkong_shi = get_xunkong(shizhu)
    
    def kong_to_gong(kong):
        return [ZHI_GONG.get(z) for z in kong if ZHI_GONG.get(z)]
    
    ri_xunkong = kong_to_gong(xunkong_ri)
    shi_xunkong = kong_to_gong(xunkong_shi)
    
    shenjiang = {}
    for gong in gong_order:
        dg = dipan.get(gong,'')
        if dg:
            idx = GAN.index(dg) if dg in GAN else 0
            shenjiang[gong] = JIANG12[idx%12]
    
    sc = {
        '初传':ZHI_GONG.get(rizhu[1],1),
        '中传':ZHI_GONG.get(shizhu[1],6),
        '末传':ZHI_GONG.get(yuezhu[1],3)
    }
    
    gong_analysis = {}
    for gong in gong_order:
        xing = tianpan_xing.get(gong,'')
        men = renpan.get(gong,'')
        xing_ji = XING_JIXIONG.get(xing,{}).get(str(gong),'平')
        men_ji = MEN_JIXIONG.get(men,{}).get(str(gong),'平')
        
        scores = {'大吉':2,'吉':1,'平':0,'凶':-1,'大凶':-2}
        total = scores.get(xing_ji,0)+scores.get(men_ji,0)
        if gong in ri_xunkong or gong in shi_xunkong:
            total -= 1
        
        if total>=2: ping='大吉'
        elif total==1: ping='吉'
        elif total==0: ping='平'
        elif total==-1: ping='凶'
        else: ping='大凶'
        
        gong_analysis[gong] = {'总评':ping,'吉凶分':total}
    
    return {
        '地盘':dipan,'天盘星':tianpan_xing,'天盘干':tianpan_gan,
        '人盘':renpan,'神盘':shenpan,'十二神将':shenjiang,
        '宫位分析':gong_analysis,'值符':zhifu,'值使':zhishi,
        '值使落宫':zhishi_gong,'阴阳':yin_yang,'局数':ju_shu,
        '节气':jieqi,'时旬空':xunkong_shi,'日旬空':xunkong_ri,
        '时旬空宫':shi_xunkong,'日旬空宫':ri_xunkong,'三传':sc,
    }

# ========== 分析函数 ==========
def analyze_nianming(result,nianming):
    lines = []
    lines.append("<h4>👤 年命分析</h4>")
    lines.append("<p>年命: "+nianming+"</p>")
    
    nianming_gong = ZHI_GONG.get(nianming[1],'')
    if nianming_gong:
        a = result['宫位分析'].get(nianming_gong,{})
        lines.append("<p>年命落"+str(nianming_gong)+"宫，总评: "+a.get('总评','未知')+"</p>")
        
        # 刑冲合害（简化）
        ri_zhi = ''
        for gong in [1,8,3,4,9,2,7,6]:
            if result['地盘'].get(gong,'')==nianming[0]:
                ri_zhi = result['人盘'].get(gong,'')
                break
        if ri_zhi:
            lines.append("<p>日干临"+ri_zhi+"门</p>")
    return ''.join(lines)

def analyze_question(result,qtype):
    lines = []
    lines.append("<h4>🔮 占事分析 · "+qtype+"</h4>")
    
    # 用神取法
    yongshen_map = {
        '考试':'天辅+丁奇','走失':'六合+日干','疾病':'天芮+乙奇',
        '投资':'生门+甲子戊','工作':'开门+年干','求财':'生门+甲子戊',
        '婚姻':'六合+乙庚','出行':'日干+九宫','竞争':'值符+庚',
    }
    yongshen = yongshen_map.get(qtype,'值符+日干')
    lines.append("<p><b>用神:</b> "+yongshen+"</p>")
    
    # 吉凶判断（简化）
    zhishi_gong = result.get('值使落宫','')
    zhishi_ping = result['宫位分析'].get(zhishi_gong,{}).get('总评','平')
    lines.append("<p>值使落"+str(zhishi_gong)+"宫，总评: <b>"+zhishi_ping+"</b></p>")
    
    # 根据吉凶给建议
    if zhishi_ping in ['大吉','吉']:
        lines.append("<p>【吉象】值使落吉宫，所问之事有转机，宜主动推进。</p>")
    elif zhishi_ping=='平':
        lines.append("<p>【平象】吉凶参半，宜观望等待，不可冒进。</p>")
    else:
        lines.append("<p>【凶象】值使落凶宫，所问之事多阻滞，宜保守退守。</p>")
    
    return ''.join(lines)

# ========== 渲染 ==========
def render_pan(result):
    lines = []
    lines.append("<div class='card'>")
    lines.append("<div class='card-title'>📋 盘局信息</div>")
    lines.append("<div class='info-line'>")
    lines.append("<b>"+result.get('节气','')+"</b> | "+result['阴阳']+"遁"+str(result['局数'])+"局<br>")
    lines.append("值符: "+result['值符']+" | 值使: "+result['值使']+" | 值使落"+str(result['值使落宫'])+"宫<br>")
    lines.append("旬空: 时"+result['时旬空']+"→"+str(result['时旬空宫'])+" 日"+result['日旬空']+"→"+str(result['日旬空宫']))
    lines.append("</div>")
    lines.append("</div>")
    
    lines.append("<div class='card'>")
    lines.append("<div class='card-title'>🧭 九宫排盘</div>")
    lines.append("<div class='pan-grid'>")
    for gong in [4,9,2,3,5,7,8,1,6]:
        if gong==5:
            lines.append("<div class='gong' style='display:flex;align-items:center;justify-content:center;background:rgba(212,175,55,0.1)'><div style='color:#d4af37;font-size:1.2em;font-weight:700'>中五宫</div></div>")
            continue
        a = result['宫位分析'].get(gong,{})
        score = a.get('吉凶分',0)
        css = 'gong-daji' if score>=2 else ('gong-jixiong' if score==1 else ('gong-xiong' if score==-1 else ('gong-daxiong' if score<=-2 else '')))
        star = "⭐" if gong==result.get('值使落宫') else ""
        
        lines.append("<div class='gong "+css+"'>")
        lines.append("<div class='gong-header'>"+str(gong)+"宫<span class='gong-star'>"+star+"</span></div>")
        lines.append("<div class='gong-row'><span class='label'>地:</span>"+result['地盘'].get(gong,'')+"</div>")
        lines.append("<div class='gong-row'><span class='label'>天:</span>"+result['天盘星'].get(gong,'')+result['天盘干'].get(gong,'')+"</div>")
        lines.append("<div class='gong-row'><span class='label'>人:</span>"+result['人盘'].get(gong,'')+"</div>")
        lines.append("<div class='gong-row'><span class='label'>神:</span>"+result['神盘'].get(gong,'')+"</div>")
        lines.append("<div class='gong-row'><span class='label'>将:</span>"+result['十二神将'].get(gong,'')+"</div>")
        color = '#28a745' if score>0 else ('#dc3545' if score<0 else '#888')
        lines.append("<div class='gong-ping' style='color:"+color+"'>"+a.get('总评','未知')+"</div>")
        lines.append("</div>")
    lines.append("</div>")
    
    sc = result['三传']
    lines.append("<div class='sanchuan'>")
    lines.append("<span><b>初传</b> "+str(sc['初传'])+"宫</span>")
    lines.append("<span><b>中传</b> "+str(sc['中传'])+"宫</span>")
    lines.append("<span><b>末传</b> "+str(sc['末传'])+"宫</span>")
    lines.append("</div>")
    lines.append("</div>")
    
    return '\n'.join(lines)

# ========== 事件绑定 ==========
@when("click","#btn-pai")
def on_click(event):
    year = int(document.getElementById("year").value)
    month = int(document.getElementById("month").value)
    day = int(document.getElementById("day").value)
    hour = int(document.getElementById("hour").value)
    nianming = document.getElementById("nianming").value
    
    # 检查是否使用高级设置
    adv = document.getElementById("advancedPanel")
    if adv.classList.contains("open"):
        jieqi = document.getElementById("jieqi").value
        lunar_month = int(document.getElementById("lunar_month").value)
        nianzhu = document.getElementById("nianzhu").value
        yuezhu = document.getElementById("yuezhu").value
        rizhu = document.getElementById("rizhu").value
        shizhu = document.getElementById("shizhu").value
        yin_yang = document.getElementById("yinyang").value
        ju_shu = int(document.getElementById("jushu").value)
    else:
        # 自动推算
        nianzhu,yuezhu,rizhu,shizhu,zhi_idx = auto_calc_sizhu(year,month,day,hour)
        jieqi = get_jieqi(year,month,day)
        yin_yang = get_yinyang(jieqi)
        ju_shu = JUSHU_MAP.get(jieqi,1)
        lunar_month = month
    
    result = paipan_core(nianzhu,yuezhu,rizhu,shizhu,jieqi,ju_shu,yin_yang,lunar_month)
    
    html = render_pan(result)
    
    # 显示自动推算的四柱
    auto_info = "<div class='card'><div class='card-title'>📐 四柱</div>"
    auto_info += "<div class='info-line'>年柱: "+nianzhu+" | 月柱: "+yuezhu+" | 日柱: "+rizhu+" | 时柱: "+shizhu+"</div>"
    auto_info += "</div>"
    html = auto_info + html
    
    if nianming:
        html = html + "<div class='card'><div class='analysis-box'>"+analyze_nianming(result,nianming)+"</div></div>"
    
    q = document.getElementById("question")
    if q and q.value:
        html = html + "<div class='card'><div class='analysis-box'>"+analyze_question(result,q.value)+"</div></div>"
    
    result_div = document.getElementById("result")
    result_div.innerHTML = html
    result_div.classList.remove("hidden")
